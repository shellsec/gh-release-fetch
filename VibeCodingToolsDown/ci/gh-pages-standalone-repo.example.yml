# 若将「仅含本包目录内容」单独建 GitHub 仓库时使用：
# 复制为 .github/workflows/xxx.yml，路径无 VibeCodingToolsDown/ 前缀。

name: VibeCodingToolsDown manifest & gh-pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/*.yml"

permissions:
  contents: write

concurrency:
  group: vibecodingtoolsdown-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - name: Build manifest
        run: python scripts/build_manifest.py --output-dir dist

      - name: Commit manifest to default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/vibecoding/manifest.json
          if git diff --staged --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore: refresh manifest [skip ci]"
            git push
          fi

      - name: Push dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: false
          keep_files: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "chore: refresh Pages dist"
